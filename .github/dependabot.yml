version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Bogota"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      next-stack:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "next-intl"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "postcss"
          - "autoprefixer"
      aws:
        patterns:
          - "@aws-sdk/*"
      tooling:
        patterns:
          - "@biomejs/biome"
          - "typescript"
          - "tsx"
          - "@types/*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      actions:
        patterns:
          - "*"
